<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wei&szlig;stern</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23202020'/%3E%3Cpath d='M16 4l3.1 9.5H29l-8 5.8 3.1 9.5L16 23l-8.1 5.8 3.1-9.5-8-5.8h9.9z' fill='%23960018'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #202020;
    --deep: #181818;
    --charcoal: #595a5e;
    --steel: #a2a9b1;
    --alabaster: #d0d4d7;
    --slate: #556776;
    --crimson: #960018;
    --crimson-mid: rgba(150, 0, 24, 0.35);
    --crimson-glow: rgba(150, 0, 24, 0.08);
  }

  html { font-size: 16px; }

  body {
    background: var(--deep);
    color: var(--alabaster);
    font-family: 'Manrope', sans-serif;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    cursor: crosshair;
  }

  /* ── Noise grain ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 5;
    pointer-events: none;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 512px 512px;
  }

  /* ── Vignette ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 4;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
  }

  /* ── Star + constellation canvas ── */
  #sky {
    position: fixed;
    inset: 0;
    z-index: 0;
  }


  /* ── Main container ── */
  .page {
    position: relative;
    z-index: 6;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    pointer-events: none;
  }

  /* ── Corner marks ── */
  .corner {
    position: fixed;
    width: 24px;
    height: 24px;
    z-index: 10;
    opacity: 0;
    animation: cornerIn 2s ease 0.5s forwards;
  }
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: var(--charcoal);
    opacity: 0.5;
  }
  .corner--tl { top: 20px; left: 20px; }
  .corner--tl::before { top: 0; left: 0; width: 1px; height: 24px; }
  .corner--tl::after { top: 0; left: 0; width: 24px; height: 1px; }
  .corner--tr { top: 20px; right: 20px; animation-delay: 0.6s; }
  .corner--tr::before { top: 0; right: 0; width: 1px; height: 24px; }
  .corner--tr::after { top: 0; right: 0; width: 24px; height: 1px; }
  .corner--bl { bottom: 20px; left: 20px; animation-delay: 0.7s; }
  .corner--bl::before { bottom: 0; left: 0; width: 1px; height: 24px; }
  .corner--bl::after { bottom: 0; left: 0; width: 24px; height: 1px; }
  .corner--br { bottom: 20px; right: 20px; animation-delay: 0.8s; }
  .corner--br::before { bottom: 0; right: 0; width: 1px; height: 24px; }
  .corner--br::after { bottom: 0; right: 0; width: 24px; height: 1px; }

  /* ── Brand ── */
  .brand {
    text-align: center;
    margin-bottom: 2rem;
    position: relative;
  }

  .brand-name {
    font-size: clamp(3rem, 9vw, 7.5rem);
    font-weight: 200;
    letter-spacing: 0.35em;
    color: var(--alabaster);
    opacity: 0;
    animation: nameReveal 3.5s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
    text-indent: 0.35em;
    position: relative;
    text-shadow: 0 0 80px var(--crimson-glow);
  }

  /* ── Glitch layer ── */
  .brand-name::before,
  .brand-name::after {
    content: 'Wei\00df stern';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    overflow: hidden;
    opacity: 0;
  }
  .brand-name::before {
    color: rgba(150, 0, 24, 0.7);
    animation: glitch1 8s ease-in-out infinite 4s;
    clip-path: inset(0 0 65% 0);
  }
  .brand-name::after {
    color: rgba(85, 103, 118, 0.7);
    animation: glitch2 8s ease-in-out infinite 4s;
    clip-path: inset(65% 0 0 0);
  }

  /* ── Divider ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    opacity: 0;
    animation: fadeIn 2s ease 2.5s forwards;
  }

  .divider-line {
    width: clamp(120px, 28vw, 350px);
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--charcoal));
    transform: scaleX(0);
    animation: lineGrow 2s ease 3s forwards;
  }
  .divider-line:last-child {
    background: linear-gradient(90deg, var(--charcoal), transparent);
  }

  .divider-diamond {
    width: 7px;
    height: 7px;
    border: 1px solid var(--crimson);
    transform: rotate(45deg);
    flex-shrink: 0;
    opacity: 0;
    animation: diamondIn 4s ease 3.5s forwards;
  }


  /* ── Footer ── */
  .footer {
    position: fixed;
    bottom: 22px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    z-index: 10;
    opacity: 0;
    animation: fadeIn 3s ease 5s forwards;
  }

  .footer-text {
    font-family: 'Fira Code', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: var(--charcoal);
    opacity: 0.4;
  }

  /* ── Keyframes ── */
  @keyframes cornerIn {
    from { opacity: 0; }
    to { opacity: 0.35; }
  }

  @keyframes nameReveal {
    0% { opacity: 0; letter-spacing: 1em; filter: blur(12px); text-indent: 1em; }
    50% { filter: blur(0); }
    100% { opacity: 1; letter-spacing: 0.35em; text-indent: 0.35em; }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes lineGrow {
    from { transform: scaleX(0); }
    to { transform: scaleX(1); }
  }

  @keyframes diamondIn {
    0% { opacity: 0; transform: rotate(45deg) scale(0); }
    40% { opacity: 1; transform: rotate(45deg) scale(1); }
    60% { box-shadow: 0 0 0px var(--crimson-glow); }
    100% { opacity: 1; transform: rotate(45deg) scale(1); box-shadow: 0 0 15px var(--crimson-glow), 0 0 40px rgba(150,0,24,0.05); }
  }

@keyframes glitch1 {
    0%, 90%, 100% { opacity: 0; transform: none; }
    92% { opacity: 1; transform: translateX(3px) skewX(-2deg); }
    94% { opacity: 0; transform: none; }
    96% { opacity: 0.8; transform: translateX(-2px) skewX(1deg); }
    98% { opacity: 0; transform: none; }
  }

  @keyframes glitch2 {
    0%, 90%, 100% { opacity: 0; transform: none; }
    91% { opacity: 0; }
    93% { opacity: 0.8; transform: translateX(-3px) skewX(2deg); }
    95% { opacity: 0; transform: none; }
    97% { opacity: 1; transform: translateX(2px) skewX(-1deg); }
    99% { opacity: 0; }
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .brand { margin-bottom: 1.5rem; }
    .corner { display: none; }
    .glow-orb { width: 300px; height: 300px; }
    .divider-line { width: 50px; }
    body { cursor: default; }
  }
</style>
</head>
<body>

<canvas id="sky"></canvas>

<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>

<main class="page">
  <div class="brand">
    <h1 class="brand-name">Wei&szlig;stern</h1>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-diamond"></div>
    <div class="divider-line"></div>
  </div>
</main>

<div class="footer">
  <span class="footer-text">weissstern.com</span>
</div>

<script>
(function() {
  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');
  let stars = [];
  let w, h;
  let mouseX = 0.5, mouseY = 0.5;
  const edgeAlpha = new Map(); // smoothed alpha per edge pair
  const PARALLAX = 50;
  const PHI = (1 + Math.sqrt(5)) / 2;           // 1.618...
  const GOLDEN_ANGLE = Math.PI * 2 / (PHI * PHI); // 137.508° in radians

  // ═══ TOGGLE FEATURES ═══
  const FEAT = {
    goldenPlacement: true,    // 1: golden angle spiral star distribution
    fibonacciConnect: false,  // 2: fibonacci distance shells for connections
    goldenTriangles: true,    // 3: prefer golden-ratio triangles
    spiralDrift: true         // 4: drift reforms spiral over time
  };

  // connection config — derived from golden spacing
  let CONNECT_DIST = 170; // recalculated in create()
  let MIN_SEPARATION = 40;
  // fibonacci shells: each shell is a band ±12px around the fib number
  const FIB_SHELLS = [55, 89, 144];
  const FIB_BAND = 10;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }

  function create() {
    stars = [];
    edgeAlpha.clear();
    const count = Math.floor((w * h) / 8000);

    // φ-distributed spacing: derive distances from average star separation
    const avgSpacing = Math.sqrt((w * h) / count);
    MIN_SEPARATION = avgSpacing / PHI;       // ~62% of avg
    CONNECT_DIST = avgSpacing * PHI;         // ~162% of avg

    // precompute golden spiral anchor points (used if spiralDrift is on)
    const spiralCx = w / 2, spiralCy = h / 2;
    const maxR = Math.sqrt(w * w + h * h) / 2;

    const minSepSq = MIN_SEPARATION * MIN_SEPARATION;
    for (let i = 0; i < count; i++) {
      let ox, oy;
      if (FEAT.goldenPlacement) {
        // R2 sequence — 2D golden-ratio quasi-random distribution
        const g = 1.32471795724; // plastic constant
        ox = ((0.5 + i / g) % 1) * w;
        oy = ((0.5 + i / (g * g)) % 1) * h;
      } else {
        ox = Math.random() * w;
        oy = Math.random() * h;
      }

      // enforce minimum golden separation (skip if too close to existing star)
      let tooClose = false;
      for (let j = stars.length - 1; j >= Math.max(0, stars.length - 30); j--) {
        const ddx = ox - stars[j].ox, ddy = oy - stars[j].oy;
        if (ddx * ddx + ddy * ddy < minSepSq) { tooClose = true; break; }
      }
      if (tooClose) continue;

      // drift direction — if spiralDrift, bias toward spiral home
      let dx, dy;
      if (FEAT.spiralDrift) {
        // compute this star's spiral home position
        const homeR = maxR * Math.sqrt(i / count);
        const homeTheta = i * GOLDEN_ANGLE;
        const homeX = spiralCx + Math.cos(homeTheta) * homeR;
        const homeY = spiralCy + Math.sin(homeTheta) * homeR;
        // store home for spring force in draw loop
        stars._homeX = homeX;
        stars._homeY = homeY;
        // still give initial random drift
        dx = (Math.random() - 0.5) * 0.12;
        dy = (Math.random() - 0.5) * 0.12;
      } else {
        dx = (Math.random() - 0.5) * 0.12;
        dy = (Math.random() - 0.5) * 0.12;
      }

      stars.push({
        ox: ox,
        oy: oy,
        r: Math.random() * 1.3 + 0.3,
        baseAlpha: Math.random() * 0.5 + 0.22,
        phase: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.004 + 0.001,
        depth: Math.random(),
        dx: dx,
        dy: dy,
        orbitR: Math.random() * 12 + 3,
        orbitSpeed: (Math.random() * 0.0003 + 0.0001) * (Math.random() < 0.5 ? 1 : -1),
        orbitPhase: Math.random() * Math.PI * 2,
        // home = initial position (spring keeps stars from wandering too far)
        homeX: ox,
        homeY: oy,
        idx: i
      });
    }
  }

  function draw(time) {
    ctx.clearRect(0, 0, w, h);

    const cx = (mouseX - 0.5) * 2;
    const cy = (mouseY - 0.5) * 2;

    for (const s of stars) {
      // drift with random wandering (Brownian nudge each frame)
      s.dx += (Math.random() - 0.5) * 0.004;
      s.dy += (Math.random() - 0.5) * 0.004;
      s.ox += s.dx;
      s.oy += s.dy;

      // spiral drift: gentle spring force pulling back toward spiral home
      if (FEAT.spiralDrift) {
        const pullX = (s.homeX - s.ox) * 0.0000008;
        const pullY = (s.homeY - s.oy) * 0.0000008;
        s.dx += pullX;
        s.dy += pullY;
        // dampen so stars decelerate, then spring slowly pulls them back
        s.dx *= 0.9993;
        s.dy *= 0.9993;
      }

      // wrap at edges (only when no spring — spring handles bounds)
      if (!FEAT.spiralDrift) {
        if (s.ox < -20) s.ox = w + 20;
        if (s.ox > w + 20) s.ox = -20;
        if (s.oy < -20) s.oy = h + 20;
        if (s.oy > h + 20) s.oy = -20;
      }

      // velocity cap to prevent runaway stars
      const spd = Math.sqrt(s.dx * s.dx + s.dy * s.dy);
      if (spd > 0.15) {
        s.dx = (s.dx / spd) * 0.15;
        s.dy = (s.dy / spd) * 0.15;
      }

      const o1 = time * s.orbitSpeed + s.orbitPhase;
      s.x = s.ox + Math.cos(o1) * s.orbitR + cx * PARALLAX * s.depth;
      s.y = s.oy + Math.sin(o1) * s.orbitR + cy * PARALLAX * s.depth;
      s.alpha = s.baseAlpha + Math.sin(time * s.speed + s.phase) * s.baseAlpha * 0.35;
    }

    // ── connection logic ──
    function shouldConnect(dist) {
      if (FEAT.fibonacciConnect) {
        // only connect if distance falls within a fibonacci shell band
        for (const f of FIB_SHELLS) {
          if (Math.abs(dist - f) < FIB_BAND) return true;
        }
        return false;
      }
      return dist < CONNECT_DIST;
    }

    function connectionAlpha(dist) {
      if (FEAT.fibonacciConnect) {
        for (const f of FIB_SHELLS) {
          const d = Math.abs(dist - f);
          if (d < FIB_BAND) return (1 - d / FIB_BAND);
        }
        return 0;
      }
      return 1 - dist / CONNECT_DIST;
    }

    // ── Delaunay triangulation (Bowyer-Watson) ──
    function delaunay(pts) {
      // super triangle encompassing all points
      const margin = 10;
      const st = [
        { x: -margin, y: -margin, _st: true },
        { x: w * 3 + margin, y: -margin, _st: true },
        { x: -margin, y: h * 3 + margin, _st: true }
      ];
      let triangles = [{ a: st[0], b: st[1], c: st[2] }];

      function circumcircle(t) {
        const ax = t.a.x, ay = t.a.y;
        const bx = t.b.x, by = t.b.y;
        const cx2 = t.c.x, cy2 = t.c.y;
        const d = 2 * (ax * (by - cy2) + bx * (cy2 - ay) + cx2 * (ay - by));
        if (Math.abs(d) < 1e-10) return { x: 0, y: 0, r2: Infinity };
        const ux = ((ax * ax + ay * ay) * (by - cy2) + (bx * bx + by * by) * (cy2 - ay) + (cx2 * cx2 + cy2 * cy2) * (ay - by)) / d;
        const uy = ((ax * ax + ay * ay) * (cx2 - bx) + (bx * bx + by * by) * (ax - cx2) + (cx2 * cx2 + cy2 * cy2) * (bx - ax)) / d;
        const dx = ax - ux, dy = ay - uy;
        return { x: ux, y: uy, r2: dx * dx + dy * dy };
      }

      for (const p of pts) {
        const bad = [];
        for (const t of triangles) {
          const cc = circumcircle(t);
          const ddx = p.x - cc.x, ddy = p.y - cc.y;
          if (ddx * ddx + ddy * ddy < cc.r2) bad.push(t);
        }
        // find boundary polygon
        const edges = [];
        for (const t of bad) {
          const sides = [[t.a, t.b], [t.b, t.c], [t.c, t.a]];
          for (const [ea, eb] of sides) {
            let shared = false;
            for (const o of bad) {
              if (o === t) continue;
              const os = [[o.a, o.b], [o.b, o.c], [o.c, o.a]];
              for (const [oa, ob] of os) {
                if ((ea === oa && eb === ob) || (ea === ob && eb === oa)) { shared = true; break; }
              }
              if (shared) break;
            }
            if (!shared) edges.push([ea, eb]);
          }
        }
        triangles = triangles.filter(t => !bad.includes(t));
        for (const [ea, eb] of edges) {
          triangles.push({ a: ea, b: eb, c: p });
        }
      }

      // extract unique edges, excluding super triangle vertices
      const edgeSet = new Set();
      const result = [];
      for (const t of triangles) {
        if (t.a._st || t.b._st || t.c._st) continue;
        const pairs = [[t.a, t.b], [t.b, t.c], [t.c, t.a]];
        for (const [pa, pb] of pairs) {
          const ki = pa._idx, kj = pb._idx;
          const key = ki < kj ? ki * 100000 + kj : kj * 100000 + ki;
          if (!edgeSet.has(key)) {
            edgeSet.add(key);
            const ddx = pa.x - pb.x, ddy = pa.y - pb.y;
            result.push({ i: ki, j: kj, dist: Math.sqrt(ddx * ddx + ddy * ddy) });
          }
        }
      }
      return result;
    }

    // build connections + golden triangle filter (cached, updates every ~60 frames)
    ctx.lineWidth = 0.9;
    const USE_DELAUNAY = false;
    if (!draw._cachedEdges || ++draw._cacheAge > 60) {
      draw._cacheAge = 0;
      const connections = [];
      if (USE_DELAUNAY) {
        const pts = [];
        for (let i = 0; i < stars.length; i++) {
          pts.push({ x: stars[i].x, y: stars[i].y, _idx: i });
        }
        const delaunayEdges = delaunay(pts);
        for (const edge of delaunayEdges) {
          if (shouldConnect(edge.dist)) connections.push(edge);
        }
      } else {
        for (let i = 0; i < stars.length; i++) {
          const a = stars[i];
          for (let j = i + 1; j < stars.length; j++) {
            const b = stars[j];
            const ddx = a.x - b.x;
            const ddy = a.y - b.y;
            const dist = Math.sqrt(ddx * ddx + ddy * ddy);
            if (shouldConnect(dist)) connections.push({ i, j, dist });
          }
        }
      }

      // golden triangle filter
      let drawSet = null;
      if (FEAT.goldenTriangles && connections.length > 0) {
        drawSet = new Set();
        const byNode = new Map();
        for (let c = 0; c < connections.length; c++) {
          const { i, j } = connections[c];
          if (!byNode.has(i)) byNode.set(i, []);
          if (!byNode.has(j)) byNode.set(j, []);
          byNode.get(i).push(c);
          byNode.get(j).push(c);
        }
        for (let c = 0; c < connections.length; c++) {
          const { i, j, dist: dij } = connections[c];
          const ni = byNode.get(i) || [];
          const nj = byNode.get(j) || [];
          for (const ci of ni) {
            const other_i = connections[ci].i === i ? connections[ci].j : connections[ci].i;
            for (const cj of nj) {
              const other_j = connections[cj].i === j ? connections[cj].j : connections[cj].i;
              if (other_i === other_j) {
                const sides = [dij, connections[ci].dist, connections[cj].dist].sort((a, b) => a - b);
                const ratio = sides[2] / sides[1];
                if (Math.abs(ratio - PHI) < 0.3) {
                  drawSet.add(c);
                  drawSet.add(ci);
                  drawSet.add(cj);
                }
              }
            }
          }
        }
        for (let c = 0; c < connections.length; c++) {
          if (!drawSet.has(c)) {
            const hash = (connections[c].i * 7919 + connections[c].j * 104729) % 100;
            if (hash < 30) drawSet.add(c);
          }
        }
      }

      // cache the approved edge list (by star index pairs)
      draw._cachedEdges = [];
      for (let c = 0; c < connections.length; c++) {
        if (drawSet && !drawSet.has(c)) continue;
        draw._cachedEdges.push({ i: connections[c].i, j: connections[c].j });
      }
    }

    // build set of active edges for this frame
    const activeEdges = new Set();
    for (const edge of draw._cachedEdges) {
      const key = edge.i < edge.j ? edge.i * 100000 + edge.j : edge.j * 100000 + edge.i;
      activeEdges.add(key);
      const a = stars[edge.i], b = stars[edge.j];
      const ddx = a.x - b.x, ddy = a.y - b.y;
      const dist = Math.sqrt(ddx * ddx + ddy * ddy);
      const targetAlpha = dist > CONNECT_DIST * 1.3 ? 0 :
        (1 - dist / (CONNECT_DIST * 1.3)) * Math.min(a.alpha, b.alpha) * 1.0;
      // smooth toward target
      const cur = edgeAlpha.get(key) || 0;
      const next = cur + (targetAlpha - cur) * 0.04; // slow fade
      edgeAlpha.set(key, next);
      if (next > 0.005) {
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = `rgba(155, 168, 182, ${next})`;
        ctx.stroke();
      }
    }
    // fade out edges no longer in the active set
    for (const [key, val] of edgeAlpha) {
      if (!activeEdges.has(key) && val > 0.005) {
        const next = val * 0.96; // fade out
        edgeAlpha.set(key, next);
        const i = Math.floor(key / 100000), j = key % 100000;
        if (i < stars.length && j < stars.length) {
          const a = stars[i], b = stars[j];
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = `rgba(155, 168, 182, ${next})`;
          ctx.stroke();
        }
      } else if (!activeEdges.has(key)) {
        edgeAlpha.delete(key); // cleanup
      }
    }

    // draw stars
    for (const s of stars) {
      if (s.alpha <= 0) continue;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(195, 203, 213, ${Math.min(1, s.alpha * 1.4)})`;
      ctx.fill();

      // bright stars get a subtle glow
      if (s.r > 1 && s.alpha > 0.2) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(170, 178, 190, ${s.alpha * 0.12})`;
        ctx.fill();
      }
    }

    requestAnimationFrame(draw);
  }

  // smooth mouse tracking
  let targetMX = 0.5, targetMY = 0.5;
  document.addEventListener('mousemove', e => {
    targetMX = e.clientX / w;
    targetMY = e.clientY / h;
  });

  function updateMouse() {
    mouseX += (targetMX - mouseX) * 0.05;
    mouseY += (targetMY - mouseY) * 0.05;
    requestAnimationFrame(updateMouse);
  }

  resize();
  create();
  requestAnimationFrame(draw);
  requestAnimationFrame(updateMouse);

  window.addEventListener('resize', () => { resize(); create(); draw._cachedEdges = null; });

  // re-init when returning via back/forward (bfcache restore)
  window.addEventListener('pageshow', (e) => {
    if (e.persisted) { resize(); create(); draw._cachedEdges = null; requestAnimationFrame(draw); requestAnimationFrame(updateMouse); }
  });

  // restart animation when tab becomes visible again
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && stars.length === 0) { resize(); create(); draw._cachedEdges = null; requestAnimationFrame(draw); requestAnimationFrame(updateMouse); }
  });
})();
